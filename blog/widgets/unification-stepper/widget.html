<div data-widget="unification-stepper">
  <div class="us-input">
    <label for="us-constraints" class="us-sr-only">Constraints, one per line</label>
    <textarea id="us-constraints" class="us-textarea" rows="5" spellcheck="false">?2 = TyArrow(TyBool, ?3)
?2 = TyArrow(?0, ?1)
?3 = TyBool</textarea>
    <div class="us-controls">
      <button type="button" class="us-submit">Submit</button>
      <button type="button" class="us-back" disabled>Back</button>
      <button type="button" class="us-step" disabled>Step</button>
      <button type="button" class="us-reset" disabled>Reset</button>
    </div>
  </div>
  <div class="us-tree" hidden></div>
  <div class="us-heap" hidden>
    <svg class="us-heap-svg" xmlns="http://www.w3.org/2000/svg"></svg>
  </div>
  <div class="us-error" aria-live="polite"></div>
</div>
