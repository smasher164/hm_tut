<div data-widget="let-generalization-scope">
  <div class="lg-input">
    <label for="lg-expr" class="lg-sr-only">Expression to type-check</label>
    <textarea id="lg-expr" class="lg-textarea" rows="2" spellcheck="false">(fun a -> let b = (fun c -> c) a in b) true</textarea>
    <div class="lg-controls">
      <button type="button" class="lg-submit">Submit</button>
      <button type="button" class="lg-back" disabled>Back</button>
      <button type="button" class="lg-step" disabled>Step</button>
      <button type="button" class="lg-reset" disabled>Reset</button>
    </div>
    <div class="lg-mode">
      <span class="lg-mode-label">generalization rule</span>
      <label><input type="radio" name="lg-mode" class="lg-mode-naive" value="naive"> naive (generalize all)</label>
      <label><input type="radio" name="lg-mode" class="lg-mode-scoped" value="scoped" checked> scope-checked</label>
    </div>
  </div>
  <div class="lg-state" hidden>
    <div class="lg-state-metavars"><span class="lg-state-label">metavars:</span> <span class="lg-state-metavars-list"></span></div>
    <div class="lg-state-env"><span class="lg-state-label">env:</span> <span class="lg-state-env-list"></span></div>
  </div>
  <div class="lg-trace" hidden></div>
  <div class="lg-error" aria-live="polite"></div>
</div>
